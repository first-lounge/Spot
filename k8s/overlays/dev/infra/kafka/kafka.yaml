apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: infra
spec:
  clusterIP: None # Headless service로 설정하여 StatefulSet과 함께 사용
  selector:
    app: kafka
  ports:
    - name: external
      port: 9092
      targetPort: 9092
    - name: internal
      port: 29092
      targetPort: 29092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  serviceName: 'kafka-headless'
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: apache/kafka:4.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
            - containerPort: 29092
          env:
            # 기본 설정
            - name: KAFKA_NODE_ID
              value: '1'
            - name: KAFKA_PROCESS_ROLES
              value: 'broker,controller'
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: '1@localhost:19093'

            # 리스너 설정
            - name: KAFKA_LISTENERS
              value: 'INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:19093'
            - name: KAFKA_ADVERTISED_LISTENERS
              value: 'INTERNAL://kafka-0.kafka-headless.infra.svc.cluster.local:29092,EXTERNAL://kafka:9092'
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: 'INTERNAL'
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: 'CONTROLLER'
            - name: CLUSTER_ID
              value: 'J9Xz7kQPRYyK8VkqH3mW5A'

            # topic 및 replication 설정
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: '1'
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: '1'
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: '1'
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: 'true'
            - name: KAFKA_NUM_PARTITIONS
              value: '3'

            # 자원 및 로그 설정
            - name: KAFKA_HEAP_OPTS
              value: '-Xmx512M -Xms512M'
            - name: KAFKA_LOG4J_ROOT_LOGLEVEL
              value: 'WARN'
            - name: KAFKA_LOG_DIRS
              value: '/var/lib/kafka/data'

          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '500m'
              memory: '1Gi'

          # kafka 연결 상태 확인
          readinessProbe:
            tcpSocket:
              port: 29092
            initialDelaySeconds: 60
            periodSeconds: 10
          
          volumeMounts:
            - name: kafka-storage
              mountPath: /var/lib/kafka/data

  volumeClaimTemplates:
    - metadata:
        name: kafka-storage
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 10Gi