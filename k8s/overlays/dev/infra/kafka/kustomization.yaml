apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - connector-register.yaml
  - kafka-connect.yaml
  - kafka-ui.yaml
  - kafka.yaml

generatorOptions:
  disableNameSuffixHash: true

# configMap 파일 생성
configMapGenerator:
  - name: connector-init
    files:
      - connectors/order-outbox.json
      - connectors/payment-outbox.json  
      - connectors/register-connectors.sh