apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spot-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/first-lounge/Spot.git
    targetRevision: feat/2-argocd
    path: k8s/overlays/dev/spot-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: spot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true