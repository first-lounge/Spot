apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spot-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/first-lounge/Spot.git
    targetRevision: dev
    path: k8s/spot-apps
    helm:
      valueFiles:
        - ../overlays/dev/apps/values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: spot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
