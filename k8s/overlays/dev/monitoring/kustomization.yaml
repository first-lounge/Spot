apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  # Loki
  - loki/loki.yaml
  - loki/loki-config.yaml

  # fluent-bit
  - fluent-bit/fluent-bit.yaml
  - fluent-bit/fluent-bit-config.yaml

  # servicemonitors
  - servicemonitors

  # grafana
  - grafana

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    releaseName: prom
    namespace: monitoring
    valuesFile: prometheus/values.yaml

generatorOptions:
  disableNameSuffixHash: true

# ConfigMap으로 config 파일들 생성
configMapGenerator:
  - name: kafka-metrics-config
    namespace: infra
    files:
      - prometheus/kafka-metrics-config.yaml
