apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: spot-cluster
servers: 1
agents: 2

image: rancher/k3s:v1.30.14-k3s2

kubeAPI:
  hostPort: "${API_PORT}"

ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
  - port: 30000-30100:30000-30100
    nodeFilters:
      - server:*

registries:
  create:
    name: spot-registry.localhost
    host: "0.0.0.0"
    hostPort: "5000"

options:
  k3d:
    wait: true
    timeout: "120s"
  k3s:
    extraArgs:
      - arg: --tls-san=${PUBLIC_IP}
        nodeFilters:
          - server:*
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      - arg: --resolv-conf=/etc/resolv.conf
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
