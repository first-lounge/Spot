# Source: spot-apps/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spot-gateway
  labels:
    app: spot-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spot-gateway
  template:
    metadata:
      labels:
        app: spot-gateway
    spec:
      containers:
        - name: spot-gateway
          image: 322546275072.dkr.ecr.ap-northeast-2.amazonaws.com/spot-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: LOGGING_CONFIG
              value: classpath:logback-spring.xml
          envFrom:
            - secretRef:
                name: spot-secrets

          # 리소스 설정
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 1Gi

          # 헬스 체크
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1

          # 헬스 체크 (Liveness)
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5

          # 볼륨 마운트
          volumeMounts:
            - name: app-config
              mountPath: /config
              readOnly: true

      volumes:
        - name: app-config
          configMap:
            name: spot-app-config
