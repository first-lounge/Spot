# Source: spot-apps/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: www-ingress
  namespace: spot
  annotations:
    alb.ingress.kubernetes.io/load-balancer-name: "spot-dev-alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/subnets: "subnet-0da7c6829952833c5, subnet-05c166744c29468c0"
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/healthcheck-path: "/actuator/health"
spec:
  ingressClassName: alb
  rules:
    # 도메인(Spot, Kafka, Temporal, Grafana)
    - host: www.spotorder.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spot-gateway
                port:
                  number: 80
