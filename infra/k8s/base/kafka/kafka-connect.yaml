apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: spot-connect
  namespace: infra
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 4.0.0
  replicas: 1 # 2
  bootstrapServers: kafka-cluster-kafka-bootstrap.infra.svc.cluster.local:9092
#  image: spot-registry.localhost:5111/spot-connect-custom:latest
  image: 322546275072.dkr.ecr.ap-northeast-2.amazonaws.com/spot-kafka-connect:3.4.0

  groupId: spot-connect-group
  configStorageTopic: connect_configs
  offsetStorageTopic: connect_offsets
  statusStorageTopic: connect_status
  
  config:
    config.storage.replication.factor: 1  # 3
    offset.storage.replication.factor: 1  # 3
    status.storage.replication.factor: 1  # 3
    
    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: false
    value.converter.schemas.enable: false
    config.providers: env
    config.providers.env.class: org.apache.kafka.common.config.provider.EnvVarConfigProvider
    log.level: WARN

  template:
    pod:
      enableServiceLinks: false
      affinity: # 특정 노드에 생성되도록 지정
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - ip-10-0-20-53.ap-northeast-2.compute.internal
    connectContainer:
      env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: spot-secrets
              key: DB_HOST
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: spot-secrets
              key: DB_NAME
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: spot-secrets
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: spot-secrets
              key: SPRING_DATASOURCE_PASSWORD

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "750m"
      memory: "2Gi"