apiVersion: apps/v1
kind: Deployment
metadata:
  name: spot-order
  namespace: spot
  labels:
    app: spot-order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spot-order
  template:
    metadata:
      labels:
        app: spot-order
    spec:
      containers:
        - name: spot-order
          image: 322546275072.dkr.ecr.ap-northeast-2.amazonaws.com/spot-order
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: LOGGING_CONFIG
              value: "classpath:logback-spring.xml"
          envFrom:
            - secretRef:
                name: spot-secrets
          volumeMounts:
            - name: app-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "75m"
            limits:
              memory: "1Gi"
              cpu: "800m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 150
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 180
            periodSeconds: 30
      volumes:
        - name: app-config
          configMap:
            name: spot-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: spot-order
  namespace: spot
  labels:
    app: spot-order
spec:
  selector:
    app: spot-order
  ports:
    - name: http
      port: 8082
      targetPort: 8082
