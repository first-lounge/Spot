{{- range .Values.ingress.subs }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .name }}-ingress
  namespace: {{ .namespace }}
  annotations:
  {{- range $key, $value := $.Values.ingress.annotations }}
  {{- if ne $key "alb.ingress.kubernetes.io/healthcheck-path" }}
    {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .healthPath | default "/" | quote }}
    alb.ingress.kubernetes.io/group.name: spot-ingress
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  rules:
    # 도메인(Spot, Kafka, Temporal, Grafana)
    - host: {{ .name }}.{{ $.Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .serviceName }}
                port:
                  number: 80
{{- end}}